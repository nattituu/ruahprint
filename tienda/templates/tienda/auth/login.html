{% extends 'tienda/base.html' %}

{% block content %}
<div class="form-card form-card-centrado">

    <h2 class="text-center">🔐 Iniciar Sesión</h2>
    <p class="form-subtitle text-center">Ingresa tus credenciales para gestionar etiquetas</p>
    <hr>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="btn-guardar">ENTRAR</button>
        </div>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'index' %}" class="link-volver">← Volver a la tienda</a>
    </div>

</div>
{% endblock %}
